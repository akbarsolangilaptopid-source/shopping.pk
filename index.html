<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping.pk/Login Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="login-container">
        <h2>Welcome Back</h2>
        <form>
            <div class="input-group">
                <label for="username">Email</label>
                <input type="text" id="lmail" required placeholder="Enter your Email">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="lpass" required placeholder="Enter your password">
            </div>
            
            <button type="submit" id="btn1" class="login-btn" onclick="login()">Sign In</button>
            
            <p class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></p>
        </form>
    </div>



    <script src="app.js"></script>
    <script src="app2.js"></script>
</body>
</html>
