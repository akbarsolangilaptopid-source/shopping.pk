<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping.pk/Signup Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="login-container signupage">
        <h2>Create Account</h2>
        <form action="#" method="POST">
            
            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="sname" name="fullname" required placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="smail" name="email" required placeholder="Enter your email">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="spass" name="password" required placeholder="Create a password">
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="spass" name="confirm-password" required placeholder="Confirm your password">
            </div>
            
            <button type="submit" class="login-btn" onclick="signup()">Sign Up</button>
            
            <p class="signup-link">Already have an account? <a href="index.html">Log in</a></p>
        </form>
    </div>


    <script src="app.js"></script>
    <script src="app2.js"></script>
</body>
</html>
